<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="nexusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0a0a0a"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#nexusGradient)" stroke-width="8" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#nexusGradient)" stroke-width="4" opacity="0.5"/>
  <!-- Center orb -->
  <circle cx="256" cy="256" r="60" fill="url(#nexusGradient)"/>
  <!-- Core glow -->
  <circle cx="256" cy="256" r="30" fill="#34d399" opacity="0.8"/>
  <!-- N letter -->
  <text x="256" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="#0a0a0a" text-anchor="middle">N</text>
</svg>
